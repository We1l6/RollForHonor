name: Run Tests on Merge to Develop

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install full dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libasound2-dev libudev-dev
          ls -la /usr/include/X11
          ls -la /usr/lib/x86_64-linux-gnu/libX11*

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DX11_X11_INCLUDE_PATH=/usr/include/X11 \
            -DX11_X11_LIB=/usr/lib/x86_64-linux-gnu/libX11.so

      - name: Build
        run: |
          cd build
          cmake --build . --verbose

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
